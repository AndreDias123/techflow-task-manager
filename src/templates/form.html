<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ 'Editar tarefa' if task else 'Nova tarefa' }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="form-wrapper">
    <section class="form-card">
      <h1>{{ 'Editar tarefa' if task else 'Nova tarefa' }}</h1>
      <form method="post">
        <label>Título
          <input type="text" name="title" value="{{ task.title if task else '' }}" required minlength="3">
        </label>

        <label>Descrição
          <textarea name="description" rows="5">{{ task.description if task else '' }}</textarea>
        </label>

        <label>Prioridade
          <select name="priority" required>
            {% for option in ['Alta', 'Média', 'Baixa'] %}
              <option value="{{ option }}" {% if task and task.priority == option %}selected{% endif %}>{{ option }}</option>
            {% endfor %}
          </select>
        </label>

        <label>Status
          <select name="status" required>
            {% for option in ['A Fazer', 'Em Progresso', 'Concluído'] %}
              <option value="{{ option }}" {% if task and task.status == option %}selected{% endif %}>{{ option }}</option>
            {% endfor %}
          </select>
        </label>

        <div class="actions-inline">
          <button class="button primary" type="submit">Salvar</button>
          <a class="button" href="{{ url_for('index') }}">Voltar</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
